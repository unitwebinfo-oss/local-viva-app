pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
            def flutterSdkPath = properties.getProperty("flutter.sdk")
            if (flutterSdkPath != null) {
                return flutterSdkPath
            }
        }
        def envFlutterRoot = System.getenv("FLUTTER_ROOT")
        if (envFlutterRoot != null) {
            return envFlutterRoot
        }
        throw new Exception("Flutter SDK not found. Set flutter.sdk in local.properties or FLUTTER_ROOT environment variable.")
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}

include ":app"
